<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="苏州市吴中区星悟空公益服务中心 — 首创'三芯融合'数字化康复体系，为孤独症儿童搭建从家庭到社会的智能桥梁。">
<title>星悟空公益服务中心</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px;scroll-padding-top:5.5rem}
body{
  font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;
  color:#2d2a26;
  background:#fefaf5;
  line-height:1.8;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
::selection{background:#e8782a;color:#fff}

.wrap{max-width:1080px;margin:0 auto;padding:0 clamp(1.5rem,5vw,3rem)}
section{padding:clamp(3rem,6vw,4rem) 0;position:relative;min-height:100vh;display:flex;align-items:center}
h1{font-size:clamp(2rem,5.5vw,3.4rem);font-weight:700;line-height:1.15;letter-spacing:-.01em}
h2{font-size:clamp(1.8rem,3.8vw,2.4rem);font-weight:700;letter-spacing:-.005em;margin-bottom:.6rem}
a{color:inherit;text-decoration:none}

/* === Nav === */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:.35rem 0;
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid rgba(232,120,42,.06);
}
.nav.scrolled{background:rgba(255,255,255,.9);box-shadow:0 1px 20px rgba(232,120,42,.06)}
.nav .wrap{display:flex;align-items:center;justify-content:space-between;padding-right:0}
.nav-brand{display:flex;align-items:center;gap:.6rem}
.nav-logo-wrap{width:150px;height:150px;overflow:visible;flex-shrink:0;margin-left:-58px;margin-top:-26px;margin-bottom:-26px}
.nav-logo{width:100%;height:100%;object-fit:contain;display:block}
.nav-links{display:flex;gap:2rem;list-style:none;margin-right:-2rem}
.nav-links a{font-size:.8rem;color:#6b6560;transition:color .25s}
.nav-links a:hover{color:#e8782a}
